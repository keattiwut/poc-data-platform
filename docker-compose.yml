name: payment-gateway-pipeline

services:
  vault:
    image: hashicorp/vault:1.17.6
    container_name: vault
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    volumes:
      - vault-data:/vault/file
      - ./vault/config.hcl:/vault/config/config.hcl:ro
    command: vault server -config=/vault/config/config.hcl
    healthcheck:
      # A sealed or uninitialized Vault returns non-200 on /v1/sys/health by
      # default, which would leave the container permanently "unhealthy"
      # before the operator ever gets a chance to run vault/init-unseal.sh.
      # sealedcode/uninitcode remap those states to 200 so this healthcheck
      # asserts only "Vault is up and responding", not "unsealed".
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8200/v1/sys/health?standbyok=true&sealedcode=200&uninitcode=200"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-postgres-dbs.sh:/docker-entrypoint-initdb.d/init-postgres-dbs.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2024-11-05T11-29-45Z
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/data-lake
      "

  # Airflow 3 (ADR-0021). Auth: Airflow 3's default SimpleAuthManager
  # auto-generates passwords and cannot take them from env vars, so we pin the
  # FAB auth manager instead - it ships as a bundled provider in the official
  # image (the upstream 3.3.0 docker-compose uses it too) and keeps
  # `airflow users create`, and thus the Vault-rendered admin credentials,
  # working unchanged.
  airflow-init:
    image: apache/airflow:3.3.0-python3.11
    container_name: airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW_ADMIN_USER: ${AIRFLOW_ADMIN_USER}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
    entrypoint: >
      /bin/bash -c "
      airflow db migrate &&
      airflow users create --username $$AIRFLOW_ADMIN_USER --password $$AIRFLOW_ADMIN_PASSWORD --firstname Admin --lastname User --role Admin --email admin@example.com
      "

  # Airflow 3 renamed the webserver component to `api-server` (the `webserver`
  # command no longer exists); it serves both the UI and the task-execution
  # API. Service/container name kept as airflow-webserver to avoid churn in
  # scripts/docs that reference it.
  airflow-webserver:
    image: apache/airflow:3.3.0-python3.11
    container_name: airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      # Tasks authenticate to the execution API with JWTs; the secret must be
      # identical across api-server and scheduler. Dev-only default matching
      # the Vault dev-token pattern; override via Vault-rendered .env.
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET:-poc-dev-jwt-secret}
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    command: api-server
    healthcheck:
      # Airflow 3 health endpoint moved under the v2 REST API.
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 10s
      timeout: 10s
      retries: 10

  airflow-scheduler:
    image: apache/airflow:3.3.0-python3.11
    container_name: airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      # Tasks (LocalExecutor subprocesses of the scheduler) talk to the
      # execution API served by the api-server, so it must be up first.
      airflow-webserver:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET:-poc-dev-jwt-secret}
      # Airflow 3: tasks call back to the api-server's execution API.
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-webserver:8080/execution/
      # POC-only: install the deps the daily_pipeline DAG's tasks need
      # (duckdb for bronze->silver promotion, dbt for the build step, dlt +
      # per-source extras for the ADR-0024 extraction tasks) at container
      # start. Slows startup; a custom image is the non-POC fix.
      # paramiko/kafka-python: the mock generator + reset script (Issue 05)
      # now also run as tasks in this container.
      _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-duckdb dbt-core dbt-clickhouse dlt[sql_database,filesystem,sftp] pyarrow psycopg2-binary confluent-kafka paramiko kafka-python}
      # Runtime env for the DAG's tasks (in-network endpoints, not host ones).
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      # Source credentials for the dlt extraction tasks (Issue 04): the mock
      # Postgres, SFTP server, and Kafka broker, all from the Vault render.
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SFTP_HOST: ${SFTP_HOST}
      SFTP_PORT: ${SFTP_PORT}
      SFTP_USER: ${SFTP_USER}
      SFTP_PASSWORD: ${SFTP_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      # In-network ClickHouse address for dbt (profiles.yml defaults to the
      # host-side localhost:8124 mapping otherwise).
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      # The promotion script and dbt project the daily_pipeline DAG invokes.
      - ./scripts:/opt/airflow/scripts:ro
      - ./dbt:/opt/airflow/dbt
      # The mock generator the mock_data_producer DAG invokes (Issue 05).
      - ./mock:/opt/airflow/mock:ro
    command: scheduler

  # New mandatory component in Airflow 3: the scheduler no longer parses DAG
  # files; a dedicated dag-processor must run.
  airflow-dag-processor:
    image: apache/airflow:3.3.0-python3.11
    container_name: airflow-dag-processor
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET:-poc-dev-jwt-secret}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    command: dag-processor

  clickhouse:
    image: clickhouse/clickhouse-server:26.3
    container_name: clickhouse
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
      # Read by clickhouse/config/named_collections.xml (from_env) so the
      # `minio_s3` named collection never has the raw values in its own
      # config - ClickHouse masks named collection secrets in
      # system.named_collections and the query log.
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      # Host-side 8123 collides with a pre-existing socksproxy.exe Windows
      # service bound to 127.0.0.1:8123 on this dev machine; remapped to
      # 8124 on the host. Container-internal port is unaffected (still 8123).
      - "8124:8123"
      - "9002:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse/config/named_collections.xml:/etc/clickhouse-server/config.d/named_collections.xml:ro
      - ./clickhouse/config/users.d/grant-named-collections.xml:/etc/clickhouse-server/users.d/grant-named-collections.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  superset-init:
    build:
      context: ./superset
    image: pipeline-superset:4.1.1
    container_name: superset-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      DATABASE_DIALECT: postgresql
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_HOST: ${POSTGRES_HOST}
      DATABASE_PORT: ${POSTGRES_PORT}
      DATABASE_DB: superset
      SUPERSET_ADMIN_USER: ${SUPERSET_ADMIN_USER}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}
    volumes:
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py
    entrypoint: >
      /bin/bash -c "
      superset db upgrade &&
      superset fab create-admin --username $$SUPERSET_ADMIN_USER --password $$SUPERSET_ADMIN_PASSWORD --firstname Admin --lastname User --email admin@example.com &&
      superset init
      "

  superset:
    build:
      context: ./superset
    image: pipeline-superset:4.1.1
    container_name: superset
    depends_on:
      superset-init:
        condition: service_completed_successfully
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      DATABASE_DIALECT: postgresql
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_HOST: ${POSTGRES_HOST}
      DATABASE_PORT: ${POSTGRES_PORT}
      DATABASE_DB: superset
    volumes:
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py
    ports:
      - "8088:8088"
    command: >
      /bin/sh -c "gunicorn --bind 0.0.0.0:8088 --workers 2 'superset.app:create_app()'"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8088/health"]
      interval: 10s
      timeout: 10s
      retries: 10

  sftp:
    image: atmoz/sftp:alpine
    container_name: sftp
    ports:
      - "12222:22"
    volumes:
      - sftp-data:/home/${SFTP_USER}/upload
      - ./docker/sftp/fix-upload-perms.sh:/etc/sftp.d/fix-upload-perms.sh
    environment:
      SFTP_USER: ${SFTP_USER}
    # atmoz/sftp requires the chroot home dir to stay root-owned (OpenSSH
    # ChrootDirectory security requirement). Its auto-chown for the
    # trailing "dir1,dir2" command arg only fires when that dir doesn't
    # already exist - but a volume mount always pre-creates its mountpoint
    # as root:root, so upload/ stays root-owned and the mock generator's
    # SFTP writes fail with Permission denied (Issue 04 discovery). The
    # bind-mounted /etc/sftp.d/ script above runs after user creation to
    # fix ownership explicitly (see docker/sftp/fix-upload-perms.sh).
    command: ${SFTP_USER}:${SFTP_PASSWORD}:1001:100:upload
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "22"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.8.0
    container_name: kafka
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

volumes:
  vault-data:
  postgres-data:
  minio-data:
  clickhouse-data:
  sftp-data:

networks:
  default:
    name: payment-gateway-net
