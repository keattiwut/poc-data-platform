# External TLS termination + login rate limiting for Superset (Issue 09 /
# ADR-0016). This is the ONLY endpoint bound to all interfaces; every other
# UI (Airflow, Grafana, MinIO console, ...) binds to 127.0.0.1 on the host
# (see docker-compose.yml port mappings) - internal/VPN-only.

# 10 login attempts/min per client IP; bursts of 5 queued, the rest 429.
limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/tls/superset-proxy.crt;
    ssl_certificate_key /etc/nginx/tls/superset-proxy.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Rate-limit the login endpoint specifically (credential stuffing is the
    # attack this exposure invites).
    location /login/ {
        limit_req zone=login burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://superset:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        proxy_pass http://superset:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
