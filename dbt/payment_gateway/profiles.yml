payment_gateway:
  target: dev
  outputs:
    dev:
      type: clickhouse
      schema: default
      # Defaults are the host-side mapping (see docker-compose.yml port
      # remap comment); Airflow tasks override with the in-network address
      # (clickhouse:8123) via these env vars set on the scheduler service.
      host: "{{ env_var('CLICKHOUSE_HOST', 'localhost') }}"
      port: "{{ env_var('CLICKHOUSE_PORT', '8124') | as_number }}"
      user: "{{ env_var('CLICKHOUSE_USER') }}"
      password: "{{ env_var('CLICKHOUSE_PASSWORD') }}"
      secure: false
