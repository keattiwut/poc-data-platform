version: 2

models:
  - name: stg_bank_transactions
    description: >
      Bank-side Transaction records, staged from the lake's silver zone.
      One row per Transaction ID that the Bank has reported (already
      deduplicated by the bronze-to-silver promotion step). No "initiated"
      state - the Bank only sees requests submitted for authorization.
    columns:
      - name: transaction_id
        description: Gateway-assigned Transaction ID (CONTEXT.md), shared with stg_partner_transactions.
        data_tests:
          - not_null
          - unique
          - no_pan_like_values
      - name: bank_id
        description: The Bank that processed this transaction.
        data_tests:
          - not_null
          - no_pan_like_values
      - name: state
        description: authorized/captured/settled/failed/refunded - no "initiated" (Partner-only state).
        data_tests:
          - not_null
          - accepted_values:
              values: ['authorized', 'captured', 'settled', 'failed', 'refunded']
      - name: decline_reason
        description: Why the transaction failed (NULL unless declined; CONTEXT.md reason set).
        data_tests:
          - accepted_values:
              values: ['insufficient_funds', 'fraud_suspected', 'technical_error', 'invalid_account']
