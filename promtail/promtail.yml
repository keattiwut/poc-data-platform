# Promtail (Issue 08): ships every Compose container's logs to Loki, labeled
# by container name so Grafana can correlate logs with Prometheus metrics by
# service and time (the "PLG stack", ADR-0008). Discovers containers through
# the mounted Docker socket.
server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: service
