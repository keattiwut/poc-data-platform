# CI gate (Issue 10 / PRD): every PR touching pipeline code must pass a
# DAG parse-check + dbt parse (lint job) and a full end-to-end run of the
# dev stack - extraction through dashboard - including dbt build + tests
# (e2e job). Branch protection on master requires both jobs plus a review
# approval before merge.
name: ci

on:
  pull_request:
  push:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Airflow (DAG parse-check deps)
        run: |
          pip install "apache-airflow==3.3.0" apache-airflow-providers-standard \
            --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-3.3.0/constraints-3.11.txt"

      - name: Parse-check every DAG (fails on import errors)
        run: |
          python - <<'EOF'
          import sys
          from airflow.models import DagBag
          bag = DagBag("airflow/dags", include_examples=False)
          for path, err in bag.import_errors.items():
              print(f"IMPORT ERROR {path}:\n{err}")
          print(f"parsed DAGs: {sorted(bag.dags)}")
          expected = {"daily_pipeline", "mock_data_producer", "reset_mock_data"}
          missing = expected - set(bag.dags)
          sys.exit(1 if bag.import_errors or missing else 0)
          EOF

      - name: dbt parse (models, tests, sources compile-check)
        env:
          CLICKHOUSE_USER: ci
          CLICKHOUSE_PASSWORD: ci
        run: |
          pip install dbt-core dbt-clickhouse
          cd dbt/payment_gateway && DBT_PROFILES_DIR=. dbt parse

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Host-side deps (generator, promotion, dbt, verify scripts)
        run: pip install paramiko kafka-python psycopg2-binary duckdb requests dbt-core dbt-clickhouse

      - name: TLS material + Vault bring-up + secret render
        run: |
          ./scripts/generate-tls-certs.sh
          docker compose up -d vault
          for i in $(seq 1 30); do
            curl --cacert tls/ca.crt -sf "https://localhost:8200/v1/sys/health?sealedcode=200&uninitcode=200" > /dev/null && break
            sleep 2
          done
          ./vault/init-unseal.sh
          ./vault/seed-secrets.sh
          ./scripts/render-env-from-vault.sh

      - name: Bring up the dev stack (core services; observability excluded for runner RAM)
        run: |
          docker compose up -d postgres minio minio-init clickhouse sftp kafka \
            airflow-init airflow-webserver airflow-scheduler airflow-dag-processor \
            superset-init superset

      - name: Wait for the scheduler's task dependencies
        run: |
          for i in $(seq 1 90); do
            docker compose exec -T airflow-scheduler python -c "import dlt, confluent_kafka, paramiko, kafka" 2>/dev/null && exit 0
            sleep 10
          done
          echo "scheduler deps never became ready"; docker compose logs airflow-scheduler | tail -50; exit 1

      - name: End-to-end walking skeleton (generator -> dlt -> lake -> dbt build+test -> ClickHouse -> Superset)
        run: ./scripts/verify-walking-skeleton.sh

      - name: No DAG import errors in the live scheduler
        run: |
          ERRORS=$(docker compose exec -T airflow-scheduler airflow dags list-import-errors 2>/dev/null | grep -c "\.py" || true)
          [ "${ERRORS:-0}" -eq 0 ] || { docker compose exec -T airflow-scheduler airflow dags list-import-errors; exit 1; }

      - name: Stack logs on failure
        if: failure()
        run: docker compose ps -a && docker compose logs --tail 30
