# Prometheus scrape config (Issue 08 / ADR-0008): the three pipeline
# services' native metrics endpoints, plus the observability stack itself.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: clickhouse
    static_configs:
      - targets: ["clickhouse:9363"]

  - job_name: minio
    metrics_path: /minio/v2/metrics/cluster
    scheme: https
    tls_config:
      ca_file: /etc/prometheus/ca.crt
    static_configs:
      - targets: ["minio:9000"]

  # Airflow has no HTTP /metrics endpoint; its native metrics support is
  # StatsD, bridged to Prometheus by the statsd-exporter sidecar (the
  # standard Airflow pattern).
  - job_name: airflow
    static_configs:
      - targets: ["statsd-exporter:9102"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]
